version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hpbrain
    ports:
      - "5432:5432"
    volumes:
      - hpbrain-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - hpbrain-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: hpbrain
      PGUSER: postgres
      PGPASSWORD: postgres
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?Set a real JWT_SECRET in a .env file before running docker-compose}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    entrypoint: ["sh", "/repo/api/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  hpbrain-postgres-data:
  hpbrain-neo4j-data:
