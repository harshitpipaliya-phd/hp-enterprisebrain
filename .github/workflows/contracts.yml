name: contracts
on:
  pull_request:
    paths: ['contracts/**']
  push:
    branches: [main]
    paths: ['contracts/**']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci || npm install
      - name: Regenerate types from schemas
        run: cd contracts && npm run generate
      - name: Fail if generated types are stale or hand-edited
        run: |
          if ! git diff --exit-code contracts/dist/; then
            echo "::error::contracts/dist/ is stale or hand-edited."
            echo "Fix: cd contracts && npm run generate && git commit"
            exit 1
          fi
