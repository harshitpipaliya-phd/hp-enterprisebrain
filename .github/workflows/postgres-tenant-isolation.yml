name: postgres-tenant-isolation
on:
  pull_request:
    paths: ['database/src/**']
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Postgres tenant-isolation checker
        run: node scripts/check-tenant-isolation.mjs
