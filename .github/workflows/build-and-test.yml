name: build-and-test
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      # Real Postgres for this pipeline — every prior verification in this
      # project's history ran against in-memory mocks only, since no live
      # database was ever available in the environment doing the work. CI is
      # the first place that gap actually closes.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hpbrain
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports: ['7687:7687', '7474:7474']
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - run: npm install
      - run: npm run generate

      - name: Build database
        run: cd database && npx tsc
      - name: Build events
        run: cd events && npx tsc
      - name: Build api
        run: cd api && npx tsc
      - name: Build web
        run: cd web && npx tsc --noEmit

      - name: Run Postgres migrations
        run: npm run db:migrate
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: hpbrain
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: Run Neo4j migrations
        run: cd api && npm run graph:migrate
        env:
          NEO4J_URI: neo4j://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password

      - name: Run tests
        run: cd api && node --test dist/tests/*.test.js
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: hpbrain
          PGUSER: postgres
          PGPASSWORD: postgres
          NEO4J_URI: neo4j://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password
          JWT_SECRET: ci-test-secret-not-for-production
